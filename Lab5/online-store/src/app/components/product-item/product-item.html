<div class="card">
  <img [src]="product().image" />

  <h3>{{ product().name }}</h3>
  <p>{{ product().description }}</p>
  <p>Price: {{ product().price | number  }}</p>
  <p>Rating: {{ product().rating }}</p>
  <p>❤ {{ product().likes }}</p>

  <button (click)="like()">Like</button>
  <button (click)="shareWhatsApp()">Share to WhatsApp</button>
  <button (click)="shareTelegram()">Share to Telegram</button>
  <button (click)="remove()">Delete</button>
  <button (click)="buy()" class="buy-button">Buy Now</button>
</div>
