<h2>Album Photos</h2>

<div *ngIf="photos$ | async as photos; else loading">

  <div class="grid">

    <div *ngFor="let photo of photos">
      <img [src]="'https://picsum.photos/200?random=' + photo.id" [alt]="photo.title">
      <p>{{ photo.title }}</p>
    </div>

  </div>

  <br>
  <button [routerLink]="['/albums', albumId]">Back</button>

</div>

<ng-template #loading>
  <p>Loading photos...</p>
</ng-template>
